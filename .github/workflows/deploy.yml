name: Deploy to bazmivoicechat.com

# The production host (CloudPanel @ 187.124.213.14) sits behind a provider
# firewall that drops inbound SSH from datacenter/cloud IP ranges — so GitHub's
# runners cannot SSH/rsync to it on ANY port (22 and 2222 both time out, while
# 80/443 are open). Deployment is therefore PULL-based: a systemd timer on the
# server fetches this repo every 60s and publishes the live commit to
# /deployed.txt. This workflow validates the build, then polls that file over
# HTTPS until production confirms it is serving the pushed commit.

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate build
        run: |
          test -f index.html
          test -f assets/logo.png
          grep -q "<title>" index.html
          test "$(wc -c < index.html)" -gt 2000
          echo "✓ build looks valid"

      - name: Wait for production to serve ${{ github.sha }}
        run: |
          echo "Waiting for the server's 60s pull timer to publish this commit…"
          for i in $(seq 1 30); do
            LIVE=$(curl -fsSk --max-time 10 https://bazmivoicechat.com/deployed.txt 2>/dev/null | tr -d '[:space:]' || true)
            echo "  attempt $i — live=${LIVE:-<none>}"
            if [ "$LIVE" = "${{ github.sha }}" ]; then
              CODE=$(curl -sk -o /dev/null -w '%{http_code}' https://bazmivoicechat.com/)
              echo "✓ Production is serving ${{ github.sha }} (HTTP $CODE)"
              test "$CODE" = "200"
              exit 0
            fi
            sleep 12
          done
          echo "✗ Timed out waiting for production to report ${{ github.sha }}" >&2
          exit 1
