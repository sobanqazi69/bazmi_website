name: Deploy to bazmivoicechat.com

on:
  push:
    branches: [master]
    paths:
      - 'index.html'
      - 'assets/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_HOST: 187.124.213.14
      SITE_USER: bazmivoicechat
      WEBROOT: /home/bazmivoicechat/htdocs/bazmivoicechat.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload site (rsync)
        run: |
          rsync -az --omit-dir-times --no-perms \
            -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=yes" \
            index.html assets \
            "root@${SSH_HOST}:${WEBROOT}/"

      - name: Fix ownership & permissions
        run: |
          ssh -i ~/.ssh/id_ed25519 "root@${SSH_HOST}" "
            chown -R ${SITE_USER}:${SITE_USER} ${WEBROOT}/index.html ${WEBROOT}/assets
            chmod 644 ${WEBROOT}/index.html
            chmod 755 ${WEBROOT}/assets
            find ${WEBROOT}/assets -type f -exec chmod 644 {} +
          "

      - name: Verify live
        run: |
          CODE=$(ssh -i ~/.ssh/id_ed25519 "root@${SSH_HOST}" \
            "curl -sk -o /dev/null -w '%{http_code}' https://bazmivoicechat.com/")
          echo "https://bazmivoicechat.com → HTTP $CODE"
          test "$CODE" = "200"
